background {
    color = rgba(1a1b26FF)
    blur_passes = 3
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.1
    dots_spacing = 0.3
    outer_color = rgba(BB9AF7FF)            # purple border
    inner_color = rgba(1E1E2EFF)            # dark field
    font_color = rgba(C0CAF5FF)             # light text
    fade_on_empty = true

    position = 0, 20
    halign = center
    valign = center
}

# Keyboard layout (bottom‑right)
label {
    monitor =
    text = $LAYOUT
    color = rgba(E0AF68FF)                  # yellow/gold
    font_size = 14
    font_family = JetBrainsMono Nerd Font Propo
    position = -30, 30
    halign = right
    valign = bottom
}

# Caps Lock warning
label {
    monitor =
    text = cmd[update:250] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/check-capslock.sh
    color = rgba(F7768EFF)                  # red
    font_size = 13
    font_family = JetBrainsMono Nerd Font Propo
    position = 0, -25
    halign = center
    valign = center
}

# Clock
label {
    monitor =
    text = $TIME
    color = rgba(7AA2F7FF)                  # blue
    font_size = 65
    font_family = AlfaSlabOne               # or any preferred clock font
    position = 0, 300
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:5000] date +"%A, %B %d"
    color = rgba(BB9AF7FF)                  # purple
    font_size = 17
    font_family = JetBrainsMono Nerd Font Propo
    position = 0, 240
    halign = center
    valign = center
}

# Username
label {
    monitor =
    text =     $USER
    color = rgba(C0CAF5FF)                  # foreground
    font_size = 20
    font_family = JetBrainsMono Nerd Font Propo
    position = 0, 50
    halign = center
    valign = bottom
}

# Status (top‑left)
label {
    monitor =
    text = cmd[update:5000] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/status.sh
    color = rgba(A6E3A1FF)                  # green
    font_size = 14
    font_family = JetBrainsMono Nerd Font Propo
    position = 30, -30
    halign = left
    valign = top
}